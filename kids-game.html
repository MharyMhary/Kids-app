<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Play & Learn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
:root{
  --coral:#FF6B6B;--mint:#4ECDC4;--lavender:#A78BFA;
  --orange:#FF9F43;--pink:#FF6EB4;--dark:#2D3436;--cream:#FFFBF0;
}
html,body{height:100%;overflow:hidden;font-family:'Comic Sans MS','Chalkboard SE',cursive;background:var(--cream);touch-action:manipulation;}

/* ── HOME ── */
#home{
  height:100vh;
  background:linear-gradient(180deg,#87CEEB 0%,#B0E0FF 55%,#5DBB63 55%,#3d9e44 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  position:relative;overflow:hidden;
}
.sun{position:absolute;top:18px;right:24px;width:70px;height:70px;background:#FFD700;border-radius:50%;box-shadow:0 0 0 12px #FFE97788;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 12px #FFE97788}50%{box-shadow:0 0 0 22px #FFE97744}}
.cloud{position:absolute;background:white;border-radius:50px;opacity:.9;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:90px;height:32px;top:40px;left:20px}.c1::before{width:44px;height:44px;top:-22px;left:10px}.c1::after{width:34px;height:34px;top:-16px;left:36px}
.c2{width:70px;height:26px;top:90px;left:55%}.c2::before{width:36px;height:36px;top:-18px;left:8px}.c2::after{width:28px;height:28px;top:-12px;left:28px}
.home-title{font-size:clamp(2rem,8vw,3rem);color:white;text-shadow:3px 3px 0 #2D7D9A;letter-spacing:2px;text-align:center;z-index:1;}
.home-sub{font-size:clamp(.95rem,4vw,1.2rem);color:#fff;text-shadow:1px 1px 4px rgba(0,0,0,.3);z-index:1;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:0 20px;width:100%;max-width:420px;z-index:1;}
.menu-btn{background:white;border:none;border-radius:22px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:0 6px 0 rgba(0,0,0,.12),0 10px 20px rgba(0,0,0,.1);cursor:pointer;transition:transform .1s,box-shadow .1s;}
.menu-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
.menu-icon{font-size:2.4rem;line-height:1;}
.menu-label{font-size:clamp(.78rem,3.5vw,.98rem);font-weight:bold;color:var(--dark);text-align:center;}
.btn-balloon{border-top:6px solid var(--coral);}
.btn-alpha{border-top:6px solid var(--lavender);}
.btn-words{border-top:6px solid var(--mint);}
.btn-phonics{border-top:6px solid var(--orange);}
.btn-draw{border-top:6px solid #3498db;grid-column:span 2;}

/* ── SHARED ── */
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.topbar{display:flex;align-items:center;padding:10px 14px;gap:10px;flex-shrink:0;}
.back-btn{background:rgba(255,255,255,.85);border:none;border-radius:50%;width:46px;height:46px;font-size:1.4rem;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-title{font-size:clamp(.95rem,4.5vw,1.35rem);font-weight:bold;color:white;text-shadow:1px 1px 4px rgba(0,0,0,.25);}
.score-badge{margin-left:auto;background:rgba(255,255,255,.9);border-radius:20px;padding:6px 14px;font-size:1rem;font-weight:bold;color:var(--dark);box-shadow:0 2px 6px rgba(0,0,0,.1);white-space:nowrap;}
.nav-row{display:flex;gap:12px;padding:10px 16px 18px;flex-shrink:0;}
.nav-btn{flex:1;padding:15px;background:rgba(255,255,255,.25);border:3px solid rgba(255,255,255,.5);border-radius:18px;font-size:1.3rem;color:white;font-weight:bold;cursor:pointer;font-family:inherit;transition:background .15s;}
.nav-btn:active{background:rgba(255,255,255,.45);}
.nav-btn.dark{color:#333;border-color:#ccc;background:rgba(255,255,255,.55);}

/* ── BALLOON ── */
#balloon-screen{background:linear-gradient(180deg,#87CEEB 60%,#B8E4C9 100%);}
.balloon-banner{text-align:center;padding:9px 12px;background:rgba(255,255,255,.38);font-size:clamp(1.05rem,4.5vw,1.35rem);font-weight:bold;color:#1a3a5c;flex-shrink:0;}
#balloon-area{flex:1;position:relative;overflow:hidden;}
.balloon{position:absolute;width:74px;height:90px;border-radius:50% 50% 50% 50%/55% 55% 45% 45%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:bold;color:rgba(255,255,255,.95);text-shadow:1px 1px 3px rgba(0,0,0,.25);box-shadow:inset -8px -8px 20px rgba(0,0,0,.12),inset 5px 5px 12px rgba(255,255,255,.4);animation:floatUp linear forwards;}
.balloon::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);width:2px;height:14px;background:rgba(0,0,0,.25);}
@keyframes floatUp{from{bottom:-110px}to{bottom:110%;}}
.pop-burst{position:fixed;pointer-events:none;font-size:3rem;animation:burst .5s ease-out forwards;z-index:99;}
@keyframes burst{0%{transform:scale(.5);opacity:1;}100%{transform:scale(2.2);opacity:0;}}
#balloon-result{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.93);z-index:20;gap:14px;}
.result-emoji{font-size:4rem;}
.result-score{font-size:clamp(2rem,9vw,3.2rem);font-weight:bold;color:var(--dark);}
.result-msg{font-size:clamp(1rem,4vw,1.35rem);color:#555;text-align:center;padding:0 24px;}
.result-btn{background:var(--coral);color:white;border:none;border-radius:20px;padding:16px 36px;font-size:1.2rem;font-weight:bold;font-family:inherit;cursor:pointer;box-shadow:0 5px 0 #c0392b;}
.result-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c0392b;}

/* ── ALPHABET ── */
#alpha-screen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
#alpha-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:10px;}
.big-letter{font-size:clamp(6rem,28vw,10rem);color:white;text-shadow:4px 4px 0 rgba(0,0,0,.15);line-height:1;cursor:pointer;animation:letterPop .3s cubic-bezier(.36,.07,.19,.97);}
@keyframes letterPop{0%{transform:scale(.4) rotate(-8deg);opacity:0;}70%{transform:scale(1.12) rotate(3deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.letter-emoji{font-size:clamp(2.5rem,10vw,4rem);}
.letter-word{font-size:clamp(1.2rem,5vw,1.7rem);color:rgba(255,255,255,.95);text-align:center;text-shadow:1px 1px 4px rgba(0,0,0,.2);}
.say-btn{background:rgba(255,255,255,.9);border:none;border-radius:20px;padding:13px 26px;font-size:1.1rem;font-weight:bold;color:#764ba2;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 rgba(0,0,0,.15);}
.say-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15);}

/* ── WORDS ── */
#words-screen{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);}
#words-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px;}
.word-card{background:white;border-radius:28px;padding:22px 30px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 8px 0 rgba(0,0,0,.1),0 12px 30px rgba(0,0,0,.12);cursor:pointer;width:100%;max-width:320px;}
.word-card:active{transform:scale(.96);}
.word-emoji-big{font-size:clamp(3.5rem,16vw,6rem);line-height:1;}
.word-text{font-size:clamp(2.2rem,10vw,3.5rem);font-weight:bold;color:var(--dark);letter-spacing:6px;}
.word-hint{font-size:1rem;color:#888;}

/* ── PHONICS ── */
#phonics-screen{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);}
#phonics-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px;position:relative;}
.phonics-result-word{font-size:clamp(3rem,14vw,5.5rem);font-weight:bold;color:white;text-shadow:3px 3px 0 rgba(0,0,0,.15);min-height:1.2em;text-align:center;}
@keyframes wordReveal{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.phonics-prompt{font-size:clamp(1rem,4vw,1.25rem);color:rgba(255,255,255,.95);font-weight:bold;text-align:center;min-height:1.4em;}
/* The drag canvas sits behind the letter buttons */
#phonics-canvas-wrap{position:relative;width:100%;max-width:380px;height:clamp(180px,45vw,240px);flex-shrink:0;}
#phonics-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.phonics-letters-row{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-around;z-index:1;}
.ph-btn{width:clamp(80px,22vw,108px);height:clamp(80px,22vw,108px);border-radius:24px;border:none;font-size:clamp(2.2rem,10vw,3.4rem);font-weight:bold;cursor:pointer;font-family:inherit;color:white;text-shadow:2px 2px 4px rgba(0,0,0,.2);box-shadow:0 7px 0 rgba(0,0,0,.18),0 10px 22px rgba(0,0,0,.12);transition:transform .12s,box-shadow .12s;position:relative;}
.ph-btn.tapped{transform:scale(.9) translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
.ph-btn.lit{box-shadow:0 7px 0 rgba(0,0,0,.18),0 0 0 5px white,0 0 20px rgba(255,255,255,.7);}
.phonics-word-label{font-size:clamp(.95rem,3.8vw,1.2rem);color:rgba(255,255,255,.85);text-align:center;min-height:1.4em;}
.ph-badge{position:absolute;top:-10px;right:-10px;background:white;border-radius:50%;width:32px;height:32px;font-size:1.1rem;display:none;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.ph-badge.show{display:flex;}

/* drag line */
.drag-line{stroke:white;stroke-width:5;stroke-linecap:round;opacity:.85;stroke-dasharray:8 6;animation:dash 1s linear infinite;}
@keyframes dash{to{stroke-dashoffset:-28;}}
.done-line{stroke:#FFD700;stroke-width:7;stroke-linecap:round;opacity:1;}

/* ── DRAW ── */
#draw-screen{background:linear-gradient(135deg,#f6d365 0%,#fda085 100%);}
.draw-toolbar{display:flex;align-items:center;gap:9px;padding:10px 14px;flex-shrink:0;overflow-x:auto;}
.color-dot{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.6);cursor:pointer;flex-shrink:0;transition:transform .1s;}
.color-dot.selected{border-color:white;transform:scale(1.25);box-shadow:0 0 0 2px rgba(0,0,0,.2);}
.size-btn{background:rgba(255,255,255,.8);border:none;border-radius:12px;padding:8px 11px;font-size:1rem;cursor:pointer;flex-shrink:0;font-family:inherit;}
.clear-btn{margin-left:auto;background:rgba(255,255,255,.9);border:none;border-radius:12px;padding:8px 14px;font-size:1rem;font-weight:bold;cursor:pointer;color:#e74c3c;flex-shrink:0;font-family:inherit;}
#draw-canvas{flex:1;display:block;background:white;touch-action:none;}

/* ── STAR ── */
.star-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.star-burst{font-size:5.5rem;animation:starPop .75s cubic-bezier(.36,.07,.19,.97) forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);opacity:0;}55%{transform:scale(1.35) rotate(10deg);opacity:1;}100%{transform:scale(1) rotate(0);opacity:0;}}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="sun"></div>
  <div class="cloud c1"></div><div class="cloud c2"></div>
  <div class="home-title">🌟 Play &amp; Learn!</div>
  <div class="home-sub">What shall we do today?</div>
  <div class="menu-grid">
    <button class="menu-btn btn-balloon" onclick="showScreen('balloon-screen');startBalloons()">
      <span class="menu-icon">🎈</span><span class="menu-label">Pop Balloons</span>
    </button>
    <button class="menu-btn btn-alpha" onclick="showScreen('alpha-screen');showLetter(0)">
      <span class="menu-icon">🔤</span><span class="menu-label">ABC Letters</span>
    </button>
    <button class="menu-btn btn-words" onclick="showScreen('words-screen');showWord(0)">
      <span class="menu-icon">🗣️</span><span class="menu-label">Say Words</span>
    </button>
    <button class="menu-btn btn-phonics" onclick="showScreen('phonics-screen');startPhonics(0)">
      <span class="menu-icon">🔡</span><span class="menu-label">Letter Sounds</span>
    </button>
    <button class="menu-btn btn-draw" onclick="showScreen('draw-screen');initCanvas()">
      <span class="menu-icon">✏️</span><span class="menu-label">Draw &amp; Doodle</span>
    </button>
  </div>
</div>

<!-- BALLOON -->
<div id="balloon-screen" class="screen">
  <div class="topbar" style="background:rgba(135,206,235,.4)">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <span class="topbar-title">🎈 Pop the Balloons!</span>
    <div class="score-badge">⭐ <span id="b-hits">0</span>/<span id="b-total">5</span></div>
  </div>
  <div class="balloon-banner" id="b-banner">Get ready!</div>
  <div id="balloon-area">
    <div id="balloon-result">
      <div class="result-emoji" id="r-emoji">🎉</div>
      <div class="result-score" id="r-score">0 / 5</div>
      <div class="result-msg" id="r-msg">Great job!</div>
      <button class="result-btn" onclick="nextBalloonRound()">Next Letter ▶</button>
    </div>
  </div>
</div>

<!-- ALPHABET -->
<div id="alpha-screen" class="screen">
  <div class="topbar" style="background:rgba(102,126,234,.4)">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <span class="topbar-title">🔤 ABC Letters</span>
    <div class="score-badge" id="alpha-pos">A • 1/26</div>
  </div>
  <div id="alpha-area">
    <div class="letter-emoji" id="alpha-emoji">🍎</div>
    <div class="big-letter" id="alpha-letter" onclick="sayLetter()">A</div>
    <div class="letter-word" id="alpha-word">A is for Apple</div>
    <button class="say-btn" onclick="sayLetter()">🔊 Say it!</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="prevLetter()">◀ Back</button>
    <button class="nav-btn" onclick="nextLetter()">Next ▶</button>
  </div>
</div>

<!-- WORDS -->
<div id="words-screen" class="screen">
  <div class="topbar" style="background:rgba(240,147,251,.3)">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <span class="topbar-title">🗣️ Say the Word!</span>
    <div class="score-badge" id="words-pos">1/20</div>
  </div>
  <div id="words-area">
    <div class="word-card" onclick="sayCurrentWord()">
      <div class="word-emoji-big" id="word-emoji">🐱</div>
      <div class="word-text" id="word-text">CAT</div>
      <div class="word-hint">Tap to hear it! 🔊</div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn dark" onclick="prevWord()">◀ Back</button>
    <button class="nav-btn dark" onclick="nextWord()">Next ▶</button>
  </div>
</div>

<!-- PHONICS -->
<div id="phonics-screen" class="screen">
  <div class="topbar" style="background:rgba(17,153,142,.45)">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <span class="topbar-title">🔡 Letter Sounds</span>
    <div class="score-badge" id="ph-pos">1/50</div>
  </div>
  <div id="phonics-area">
    <div class="phonics-result-word" id="ph-result"></div>
    <div class="phonics-prompt" id="ph-prompt">Tap each letter, then draw a line to join them!</div>
    <div id="phonics-canvas-wrap">
      <svg id="phonics-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="phonics-letters-row" id="ph-letters-row"></div>
    </div>
    <div class="phonics-word-label" id="ph-label"></div>
  </div>
  <div class="nav-row">
    <button class="nav-btn dark" onclick="prevPhonics()">◀ Back</button>
    <button class="nav-btn dark" onclick="nextPhonics()">Next ▶</button>
  </div>
</div>

<!-- DRAW -->
<div id="draw-screen" class="screen">
  <div class="topbar" style="background:rgba(246,211,101,.4)">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <span class="topbar-title">✏️ Draw &amp; Doodle!</span>
  </div>
  <div class="draw-toolbar">
    <div class="color-dot selected" style="background:#e74c3c" onclick="setColor('#e74c3c',this)"></div>
    <div class="color-dot" style="background:#e67e22" onclick="setColor('#e67e22',this)"></div>
    <div class="color-dot" style="background:#f1c40f" onclick="setColor('#f1c40f',this)"></div>
    <div class="color-dot" style="background:#2ecc71" onclick="setColor('#2ecc71',this)"></div>
    <div class="color-dot" style="background:#3498db" onclick="setColor('#3498db',this)"></div>
    <div class="color-dot" style="background:#9b59b6" onclick="setColor('#9b59b6',this)"></div>
    <div class="color-dot" style="background:#ff69b4" onclick="setColor('#ff69b4',this)"></div>
    <div class="color-dot" style="background:#2c3e50" onclick="setColor('#2c3e50',this)"></div>
    <button class="size-btn" onclick="setSize(8)">●</button>
    <button class="size-btn" onclick="setSize(16)">⬤</button>
    <button class="size-btn" onclick="setSize(28)">⚫</button>
    <button class="clear-btn" onclick="clearCanvas()">🗑️ Clear</button>
  </div>
  <canvas id="draw-canvas"></canvas>
</div>

<script>
// ══════════════════════════════════
// SPEECH  — works from a real URL (GitHub Pages)
// ══════════════════════════════════
var voicesList = [];
function loadVoices(){
  voicesList = window.speechSynthesis.getVoices();
}
if(window.speechSynthesis){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(txt, rate, pitch, onEnd){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(txt);
  u.rate  = rate  || 0.82;
  u.pitch = pitch || 1.1;
  u.volume = 1;
  // prefer an English voice
  var eng = voicesList.filter(function(v){ return v.lang.startsWith('en'); });
  if(eng.length) u.voice = eng[0];
  if(onEnd) u.onend = onEnd;
  setTimeout(function(){ window.speechSynthesis.speak(u); }, 80);
}

function speakChain(parts, gap, i){
  i = i || 0;
  gap = gap || 800;
  if(i >= parts.length) return;
  var p = parts[i];
  speak(p.t, p.r||0.82, p.p||1.1, function(){
    setTimeout(function(){ speakChain(parts, gap, i+1); }, gap);
  });
}

// ══════════════════════════════════
// NAVIGATION
// ══════════════════════════════════
function showScreen(id){
  document.getElementById('home').style.display='none';
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function goHome(){
  stopBalloons();
  document.getElementById('home').style.display='';
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
}
function showStar(e){
  var el=document.createElement('div');el.className='star-overlay';
  el.innerHTML='<div class="star-burst">'+(e||'⭐')+'</div>';
  document.body.appendChild(el);setTimeout(function(){el.remove();},800);
}
function lighten(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.min(255,r+55)+','+Math.min(255,g+55)+','+Math.min(255,b+55)+')';
}

// ══════════════════════════════════
// BALLOON GAME
// ══════════════════════════════════
var BCOLS=['#FF6B6B','#FF9F43','#FFD700','#4ECDC4','#A78BFA','#FF6EB4','#5DBB63','#3498DB'];
var LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
var bRound=0, bTarget='', bHits=0, bNeeded=5;
var bActive=false, bSpawnTmr=null, bEndTmr=null;

function startBalloons(){ bRound=0; launchBalloonRound(); }

function launchBalloonRound(){
  bActive=true; bHits=0; bTarget=LETTERS[bRound%26];
  document.getElementById('b-hits').textContent='0';
  document.getElementById('b-total').textContent=bNeeded;
  document.getElementById('balloon-result').style.display='none';
  // clear old balloons
  var area=document.getElementById('balloon-area');
  area.querySelectorAll('.balloon').forEach(function(b){b.remove();});
  document.getElementById('b-banner').textContent='🎈 Pop the letter '+bTarget+'!';

  speak('Pop the letter '+bTarget+'! Find the letter '+bTarget+'!', 0.78, 1.15, function(){
    bSpawnTmr=setTimeout(spawnLoop, 200);
    bEndTmr  =setTimeout(endRound,  28000);
  });
}

function spawnLoop(){
  if(!bActive) return;
  spawnBalloon();
  bSpawnTmr=setTimeout(spawnLoop, 1500+Math.random()*700);
}

function spawnBalloon(){
  var area=document.getElementById('balloon-area');
  if(!area||!bActive) return;
  // roughly 1 in 3 is the target letter
  var letter=(Math.random()<0.35)?bTarget:LETTERS[Math.floor(Math.random()*26)];
  var b=document.createElement('div');
  b.className='balloon';
  var col=BCOLS[Math.floor(Math.random()*BCOLS.length)];
  b.style.background='radial-gradient(circle at 35% 35%,'+lighten(col)+','+col+')';
  b.style.left=(5+Math.random()*78)+'%';
  var dur=(3.8+Math.random()*2.8).toFixed(1);
  b.style.animationDuration=dur+'s';
  b.textContent=letter;
  b.dataset.letter=letter;
  b.addEventListener('pointerdown', onBalloonTap);
  area.appendChild(b);
  b.addEventListener('animationend',function(){b.remove();});
}

function onBalloonTap(e){
  e.preventDefault();
  if(!bActive) return;
  var b=e.currentTarget;
  var letter=b.dataset.letter;
  var rect=b.getBoundingClientRect();
  b.remove();
  // burst
  var burst=document.createElement('div');
  burst.className='pop-burst';
  burst.style.left=(rect.left+rect.width/2-30)+'px';
  burst.style.top =(rect.top+rect.height/2-30)+'px';
  if(letter===bTarget){
    bHits++;
    document.getElementById('b-hits').textContent=bHits;
    burst.textContent='💥';
    speak(bTarget,0.85,1.2);
    if(bHits>=bNeeded){ document.body.appendChild(burst); setTimeout(function(){burst.remove();},500); endRound(); return; }
  } else {
    burst.textContent='❌';
    speak('Oops! Find the letter '+bTarget,0.82,1.1);
  }
  document.body.appendChild(burst);
  setTimeout(function(){burst.remove();},500);
}

function endRound(){
  if(!bActive) return;
  bActive=false;
  clearTimeout(bSpawnTmr); clearTimeout(bEndTmr);
  var pct=bHits/bNeeded;
  var emoji,msg;
  if(pct>=0.8){emoji='🌟';msg='Amazing! You found all the '+bTarget+'s!';}
  else if(pct>=0.5){emoji='🎉';msg='Well done! Keep practising '+bTarget+'!';}
  else{emoji='😊';msg="Good try! Let's practise letter "+bTarget+" again soon!";}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-score').textContent=bHits+' / '+bNeeded;
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('balloon-result').style.display='flex';
  speak(msg,0.78,1.1);
  showStar(emoji);
}
function nextBalloonRound(){ bRound++; launchBalloonRound(); }
function stopBalloons(){
  bActive=false;
  clearTimeout(bSpawnTmr); clearTimeout(bEndTmr);
  var a=document.getElementById('balloon-area');
  if(a) a.querySelectorAll('.balloon').forEach(function(b){b.remove();});
}

// ══════════════════════════════════
// PHONICS — tap letters then drag to join
// ══════════════════════════════════
var phSounds={
  A:'aaaa',B:'buh',C:'kuh',D:'duh',E:'eh',F:'fuh',G:'guh',H:'huh',
  I:'ih',J:'juh',K:'kuh',L:'luh',M:'muh',N:'nuh',O:'oh',P:'puh',
  R:'ruh',S:'sss',T:'tuh',U:'uh',W:'wuh',X:'ex',Y:'yuh',Z:'zuh'
};

var phWords=[
  {w:'AT',e:'🎯'},{w:'AN',e:'🏃'},{w:'AM',e:'😊'},{w:'IN',e:'📦'},
  {w:'IT',e:'👆'},{w:'ON',e:'💡'},{w:'UP',e:'⬆️'},{w:'US',e:'👫'},
  {w:'OX',e:'🐂'},{w:'IF',e:'🤔'},
  {w:'CAT',e:'🐱',s:2},{w:'DOG',e:'🐶',s:2},{w:'BIG',e:'🐘',s:2},
  {w:'CAN',e:'🥫',s:2},{w:'CUP',e:'☕',s:2},{w:'BUS',e:'🚌',s:2},
  {w:'BED',e:'🛏️',s:2},{w:'BAG',e:'👜',s:2},{w:'BAT',e:'🦇',s:2},
  {w:'HOP',e:'🐸',s:2},{w:'HOT',e:'🌡️',s:2},{w:'HUG',e:'🤗',s:2},
  {w:'JAM',e:'🍓',s:2},{w:'JET',e:'✈️',s:2},{w:'JUG',e:'🫙',s:2},
  {w:'LAP',e:'🦵',s:2},{w:'LEG',e:'🦵',s:2},{w:'LOG',e:'🪵',s:2},
  {w:'MAP',e:'🗺️',s:2},{w:'MOP',e:'🧹',s:2},{w:'MUG',e:'☕',s:2},
  {w:'NAP',e:'😴',s:2},{w:'NUT',e:'🥜',s:2},{w:'PAN',e:'🍳',s:2},
  {w:'PET',e:'🐾',s:2},{w:'PIN',e:'📌',s:2},{w:'POT',e:'🍲',s:2},
  {w:'RAT',e:'🐭',s:2},{w:'RAN',e:'🏃',s:2},{w:'RUG',e:'🪆',s:2},
  {w:'SAT',e:'🪑',s:2},{w:'SUN',e:'☀️',s:2},{w:'SIP',e:'🧃',s:2},
  {w:'TAP',e:'🚿',s:2},{w:'TIN',e:'🥫',s:2},{w:'TUB',e:'🛁',s:2},
  {w:'VAN',e:'🚐',s:2},{w:'WEB',e:'🕸️',s:2},{w:'WET',e:'💧',s:2},
  {w:'WIN',e:'🏆',s:2},{w:'YAM',e:'🍠',s:2},{w:'ZIP',e:'🤐',s:2},
  {w:'ZAP',e:'⚡',s:2}
].slice(0,50);

var phCols=['#FF6B6B','#3498DB','#2ecc71','#9b59b6','#FF9F43','#e74c3c','#1abc9c','#d35400'];
var phIdx=0, phTapped=[], phDone=false;
var dragLine=null, dragStartBtn=null;
var btnEls=[];

function startPhonics(i){ phIdx=i; renderPhonics(); }

function renderPhonics(){
  phDone=false;
  var entry=phWords[phIdx];
  var letters=(entry.s ? entry.w.slice(0,entry.s) : entry.w).split('');
  phTapped=new Array(letters.length).fill(false);

  document.getElementById('ph-pos').textContent=(phIdx+1)+'/'+phWords.length;
  document.getElementById('ph-result').textContent='';
  document.getElementById('ph-prompt').textContent='Tap each letter to hear its sound!';
  document.getElementById('ph-label').textContent='';

  // clear SVG
  var svg=document.getElementById('phonics-svg');
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  dragLine=null; dragStartBtn=null;

  // build buttons
  var row=document.getElementById('ph-letters-row');
  row.innerHTML=''; btnEls=[];
  letters.forEach(function(letter,idx){
    var btn=document.createElement('button');
    btn.className='ph-btn';
    btn.textContent=letter;
    var col=phCols[idx%phCols.length];
    btn.style.background='radial-gradient(circle at 35% 35%,'+lighten(col)+','+col+')';
    btn.dataset.idx=idx;
    btn.dataset.letter=letter;
    // tap to hear sound
    btn.addEventListener('pointerdown',function(e){ onPhTap(e,btn,idx,letter,letters,entry); });
    row.appendChild(btn);
    btnEls.push(btn);
  });

  // set up drag-line detection on the wrap
  var wrap=document.getElementById('phonics-canvas-wrap');
  wrap.onpointermove=null; wrap.onpointerup=null;
  wrap.addEventListener('pointermove',onDragMove);
  wrap.addEventListener('pointerup',onDragEnd);
  wrap.addEventListener('pointercancel',onDragEnd);

  setTimeout(function(){ speak('Tap the letter '+letters[0]+'. '+letters[0]+' says '+phSounds[letters[0]],0.8,1.1); },400);
}

function onPhTap(e,btn,idx,letter,letters,entry){
  e.stopPropagation();
  // sound
  var snd=phSounds[letter]||letter.toLowerCase();
  speak(letter+' says '+snd,0.75,1.15);
  btn.classList.add('tapped');
  setTimeout(function(){btn.classList.remove('tapped');},300);
  phTapped[idx]=true;

  // start drag tracking
  dragStartBtn=btn;
  var wrap=document.getElementById('phonics-canvas-wrap');
  wrap.setPointerCapture && wrap.setPointerCapture(e.pointerId);

  // draw animated dashed line from centre of btn
  if(letters.length>1){
    document.getElementById('ph-prompt').textContent='Now drag to connect the letters!';
    var svg=document.getElementById('phonics-svg');
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    var pos=getBtnCenter(btn);
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('class','drag-line');
    line.setAttribute('x1',pos.x); line.setAttribute('y1',pos.y);
    line.setAttribute('x2',pos.x); line.setAttribute('y2',pos.y);
    svg.appendChild(line);
    dragLine=line;
  }
}

function onDragMove(e){
  if(!dragLine||!dragStartBtn) return;
  var wrap=document.getElementById('phonics-canvas-wrap');
  var r=wrap.getBoundingClientRect();
  var x=e.clientX-r.left, y=e.clientY-r.top;
  dragLine.setAttribute('x2',x); dragLine.setAttribute('y2',y);
}

function onDragEnd(e){
  if(!dragLine||!dragStartBtn) return;
  var wrap=document.getElementById('phonics-canvas-wrap');
  var r=wrap.getBoundingClientRect();
  var x=e.clientX-r.left, y=e.clientY-r.top;

  // check if released over a different button
  var hit=null;
  btnEls.forEach(function(b){
    if(b===dragStartBtn) return;
    var br=b.getBoundingClientRect();
    var bx=br.left-r.left, by=br.top-r.top;
    if(x>=bx && x<=bx+br.width && y>=by && y<=by+br.height) hit=b;
  });

  if(hit){
    // snap line to centre of target button
    var pos=getBtnCenter(hit);
    dragLine.setAttribute('x2',pos.x); dragLine.setAttribute('y2',pos.y);
    dragLine.setAttribute('class','done-line');
    // mark hit tapped
    var hitIdx=parseInt(hit.dataset.idx);
    phTapped[hitIdx]=true;
    var snd=phSounds[hit.dataset.letter]||hit.dataset.letter.toLowerCase();
    speak(hit.dataset.letter+' says '+snd,0.75,1.15, function(){
      // slight delay then merge
      setTimeout(function(){ mergePhonics(); },400);
    });
  } else {
    // didn't hit anything — remove line
    var svg=document.getElementById('phonics-svg');
    while(svg.firstChild) svg.removeChild(svg.firstChild);
  }
  dragLine=null; dragStartBtn=null;
}

function getBtnCenter(btn){
  var wrap=document.getElementById('phonics-canvas-wrap');
  var wr=wrap.getBoundingClientRect();
  var br=btn.getBoundingClientRect();
  return { x: br.left-wr.left+br.width/2, y: br.top-wr.top+br.height/2 };
}

function mergePhonics(){
  if(phDone) return;
  phDone=true;
  var entry=phWords[phIdx];
  var letters=(entry.s ? entry.w.slice(0,entry.s) : entry.w).split('');

  var res=document.getElementById('ph-result');
  res.textContent=entry.w+' '+entry.e;
  res.style.animation='none'; void res.offsetWidth;
  res.style.animation='wordReveal .4s cubic-bezier(.36,.07,.19,.97)';
  document.getElementById('ph-prompt').textContent='Great job! The word is:';
  document.getElementById('ph-label').textContent='👆 Tap Next for another word!';

  showStar('🌟');

  var parts=letters.map(function(l){
    return {t:l+' says '+(phSounds[l]||l.toLowerCase()),r:0.78,p:1.1};
  });
  parts.push({t:entry.w,r:0.7,p:1.05});
  speakChain(parts,700);
}

function nextPhonics(){ phIdx=(phIdx+1)%phWords.length; renderPhonics(); }
function prevPhonics(){ phIdx=(phIdx+phWords.length-1)%phWords.length; renderPhonics(); }

// DRAWING
// ══════════════════════════════════
var drawColor='#e74c3c', drawSize=12, drawing=false, lastX=0, lastY=0;
function initCanvas(){
  var c=document.getElementById('draw-canvas');
  c.width=c.offsetWidth; c.height=c.offsetHeight;
  var ctx=c.getContext('2d');
  ctx.fillStyle='white'; ctx.fillRect(0,0,c.width,c.height);
  c.addEventListener('pointerdown',function(e){
    drawing=true;
    var r=c.getBoundingClientRect(); lastX=e.clientX-r.left; lastY=e.clientY-r.top;
    ctx.beginPath(); ctx.arc(lastX,lastY,drawSize/2,0,Math.PI*2);
    ctx.fillStyle=drawColor; ctx.fill();
    c.setPointerCapture(e.pointerId);
  });
  c.addEventListener('pointermove',function(e){
    if(!drawing) return;
    var r=c.getBoundingClientRect();
    var x=e.clientX-r.left, y=e.clientY-r.top;
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y);
    ctx.strokeStyle=drawColor; ctx.lineWidth=drawSize;
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    lastX=x; lastY=y;
  });
  c.addEventListener('pointerup',function(){drawing=false;});
  c.addEventListener('pointerleave',function(){drawing=false;});
}
function setColor(c,el){ drawColor=c; document.querySelectorAll('.color-dot').forEach(function(d){d.classList.remove('selected');}); el.classList.add('selected'); }
function setSize(s){ drawSize=s; }
function clearCanvas(){ var c=document.getElementById('draw-canvas'); var ctx=c.getContext('2d'); ctx.fillStyle='white'; ctx.fillRect(0,0,c.width,c.height); speak('Let us draw something new!',0.85,1.1); }
window.addEventListener('resize',function(){
  var c=document.getElementById('draw-canvas');
  if(!c||!c.closest('.active')) return;
  var ctx=c.getContext('2d'); var img=c.toDataURL();
  c.width=c.offsetWidth; c.height=c.offsetHeight;
  var i=new Image(); i.onload=function(){ctx.drawImage(i,0,0);}; i.src=img;
});
</script>
